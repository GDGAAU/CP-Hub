version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cphub-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cphub
    ports:
      - "5433:5432"
    volumes:
      - ./server/init_utf8.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: cphub-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SERVER_PORT=5000
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_DATABASE=cphub
      - DB_PORT=5432
      - SESSION_SECRET=a_very_secret_key_123
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - db

  client:
    build: ./client
    container_name: cphub-client
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  pgdata:
